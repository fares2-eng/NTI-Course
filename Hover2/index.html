<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>card hover</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">

    <div class="card-photo photo-1"></div>

    <div class="card-info">

      <div class="card-top">
        <h3>New York City</h3>
        <span class="flag">🇺🇸</span>
      </div>

      <p class="card-date">November 2 - 4</p>

      <div class="card-extra">
        <p class="card-seats">Seats Remaining: 2</p>

        <hr class="divider">

        <p class="card-desc">Join us for our Live Infinity Session in beautiful New York City. This is a 3 day intensive workshop where you'll learn how to become a better version of...</p>

        <a class="card-link" href="#">Event Details</a>
      </div>

    </div>

  </div>

</body>
</html>
